<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Comms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #041E35;
  --bg-surface: #062B4A;
  --bg-elevated: #1A2838;
  --bg-hover: #0a3558;
  --mint: #00B894;
  --mint-dim: #009975;
  --mint-glow: rgba(0,184,148,0.18);
  --teal: #028A92;
  --teal-dim: rgba(2,138,146,0.12);
  --gold: #F5A623;
  --red: #ff4560;
  --text-bright: #FFFFFF;
  --text-body: #C8DCE8;
  --text-muted: #456070;
  --text-dim: #2e4455;
  --border: rgba(2,138,146,0.12);
  --border-accent: rgba(2,138,146,0.3);
  --font-heading: 'Cormorant Garamond', serif;
  --font-body: 'Barlow', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 3px;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--text-body);
  font-family: var(--font-body);
  font-weight: 300;
  font-size: 14px;
  line-height: 1.5;
}

/* Grid texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.3;
  background-image: radial-gradient(circle, var(--text-dim) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ===== CUSTOM SCROLLBARS ===== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--teal); }

/* ===== TOP NAV — glassmorphism ===== */
#topnav {
  position: relative;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 24px;
  height: 48px;
  padding: 0 20px;
  background: rgba(4,30,53,0.72);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
#topnav .brand {
  font-family: var(--font-heading);
  font-size: 20px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 0.5px;
}
#topnav .brand span { color: var(--mint); }
#topnav .nav-stat {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}
#topnav .nav-stat b {
  color: var(--text-body);
  font-weight: 500;
}
#topnav .nav-stat.warn b { color: var(--gold); }
.nav-spacer { flex: 1; }
#topnav .nav-link {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--teal);
  text-decoration: none;
  padding: 4px 10px;
  border: 1px solid var(--border-accent);
  border-radius: var(--radius);
  transition: background 0.15s, color 0.15s;
}
#topnav .nav-link:hover {
  background: var(--teal-dim);
  color: var(--mint);
}

/* ===== APP 3-COL GRID ===== */
#app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 220px 1fr 260px;
  height: calc(100vh - 48px);
}

/* ===== SIDEBAR ===== */
#sidebar {
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h2 {
  font-family: var(--font-heading);
  font-size: 15px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.sidebar-header .btn-new-channel {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--mint);
  background: var(--mint-glow);
  border: 1px solid var(--mint-dim);
  border-radius: var(--radius);
  padding: 2px 8px;
  cursor: pointer;
  transition: background 0.15s;
}
.sidebar-header .btn-new-channel:hover {
  background: var(--mint-dim);
  color: var(--text-bright);
}
#channel-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.channel-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
  border-left: 3px solid transparent;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.channel-item:hover {
  background: var(--bg-hover);
  color: var(--text-body);
}
.channel-item.active {
  background: var(--teal-dim);
  color: var(--text-bright);
  border-left-color: var(--mint);
}
.channel-item .ch-prefix {
  color: var(--text-dim);
  font-weight: 500;
}
.channel-item .ch-name { flex: 1; }
.channel-item .unread-badge {
  font-size: 10px;
  font-weight: 500;
  background: var(--mint);
  color: var(--bg-deep);
  padding: 0 5px;
  border-radius: 8px;
  line-height: 16px;
  min-width: 16px;
  text-align: center;
  display: none;
}
.channel-item .unread-badge.visible { display: inline-block; }

/* ===== CENTER COLUMN ===== */
#center {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-deep);
}

/* Channel header */
.channel-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  min-height: 52px;
}
.channel-header .ch-title {
  font-family: var(--font-heading);
  font-size: 18px;
  font-weight: 700;
  color: var(--text-bright);
}
.channel-header .ch-title .hash {
  color: var(--text-dim);
  margin-right: 2px;
}
.channel-header .ch-desc {
  font-size: 12px;
  color: var(--text-muted);
  border-left: 1px solid var(--border-accent);
  padding-left: 12px;
}

/* Message feed */
#message-feed {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

/* Message group */
.msg-group {
  position: relative;
  padding: 8px 12px;
  border-radius: var(--radius);
  transition: background 0.12s;
}
.msg-group:hover { background: var(--bg-hover); }
.msg-group .msg-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 2px;
}
.msg-group .msg-author {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
}
.msg-group .msg-author.agent { color: var(--mint); }
.msg-group .msg-author.human { color: var(--teal); }
.msg-group .msg-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 1px 5px;
  border-radius: 2px;
  color: var(--text-muted);
  background: var(--teal-dim);
}
.msg-group .msg-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}
.msg-group .msg-content {
  font-size: 14px;
  color: var(--text-body);
  line-height: 1.55;
  word-wrap: break-word;
}
.msg-group .msg-content p { margin-bottom: 4px; }
.msg-group .msg-content strong { font-weight: 500; color: var(--text-bright); }
.msg-group .msg-content em { font-style: italic; color: var(--text-body); }
.msg-group .msg-content code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--bg-elevated);
  padding: 1px 5px;
  border-radius: 2px;
  color: var(--mint);
}
.msg-group .msg-content pre {
  position: relative;
  background: var(--bg-elevated);
  border-left: 3px solid var(--teal);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin: 6px 0;
  overflow-x: auto;
  max-height: 80px;
  transition: max-height 0.3s ease;
  cursor: pointer;
}
.msg-group .msg-content pre.expanded {
  max-height: 600px;
}
.msg-group .msg-content pre code {
  background: none;
  padding: 0;
  color: var(--text-body);
  font-size: 12px;
  line-height: 1.4;
}

/* Action items */
.action-items { margin: 6px 0; }
.action-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  font-size: 13px;
}
.action-item input[type="checkbox"] {
  accent-color: var(--mint);
  width: 14px;
  height: 14px;
  cursor: pointer;
}
.action-item.completed label {
  text-decoration: line-through;
  color: var(--text-dim);
}

/* Attachments */
.msg-attachments {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}
.attachment-chip {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--teal);
  background: var(--teal-dim);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius);
  padding: 3px 10px;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.12s, color 0.12s;
}
.attachment-chip:hover {
  background: var(--bg-hover);
  color: var(--mint);
}

/* Inline media previews */
.msg-content .img-preview {
  max-width: 400px;
  max-height: 300px;
  border-radius: var(--radius);
  margin: 6px 0;
  display: block;
}
.msg-content .video-preview {
  max-width: 400px;
  border-radius: var(--radius);
  margin: 6px 0;
  display: block;
}

/* Metadata collapsible */
.msg-metadata {
  margin-top: 4px;
}
.msg-metadata summary {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
}
.msg-metadata summary:hover { color: var(--text-muted); }
.msg-metadata pre {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-elevated);
  padding: 6px 10px;
  border-radius: var(--radius);
  margin-top: 4px;
  max-height: none;
  border-left: none;
  cursor: default;
}

/* Message actions (reply, thread) */
.msg-actions {
  position: absolute;
  top: 4px;
  right: 8px;
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.15s;
}
.msg-group:hover .msg-actions { opacity: 1; }
.msg-actions button {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2px 8px;
  cursor: pointer;
  transition: color 0.12s, border-color 0.12s;
}
.msg-actions button:hover {
  color: var(--mint);
  border-color: var(--border-accent);
}

/* Thread indicator */
.thread-indicator {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--teal);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: var(--radius);
  transition: background 0.12s;
}
.thread-indicator:hover { background: var(--teal-dim); }
.thread-indicator .thread-count {
  font-weight: 500;
}

/* ===== COMPOSE BAR ===== */
#compose-bar {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-surface);
}
.compose-top {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
.compose-top input,
.compose-top select {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-body);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 10px;
  outline: none;
  transition: border-color 0.15s;
}
.compose-top input { flex: 1; }
.compose-top select { min-width: 90px; cursor: pointer; }
.compose-top input:focus,
.compose-top select:focus {
  border-color: var(--border-accent);
}
.compose-bottom {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
.btn-attach {
  font-family: var(--font-mono);
  font-size: 18px;
  color: var(--text-muted);
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: color 0.12s, border-color 0.12s;
  flex-shrink: 0;
}
.btn-attach:hover {
  color: var(--mint);
  border-color: var(--border-accent);
}
#compose-textarea {
  flex: 1;
  font-family: var(--font-body);
  font-weight: 300;
  font-size: 14px;
  color: var(--text-body);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  resize: none;
  min-height: 34px;
  max-height: 140px;
  outline: none;
  transition: border-color 0.15s;
  line-height: 1.4;
}
#compose-textarea:focus { border-color: var(--border-accent); }
#compose-textarea::placeholder { color: var(--text-dim); }
.btn-send {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--bg-deep);
  background: var(--mint);
  border: none;
  border-radius: var(--radius);
  padding: 8px 18px;
  cursor: pointer;
  flex-shrink: 0;
  box-shadow: 0 0 12px var(--mint-glow);
  transition: background 0.15s, box-shadow 0.15s;
}
.btn-send:hover {
  background: var(--mint-dim);
  box-shadow: 0 0 20px var(--mint-glow);
}
/* File preview tags */
#file-previews {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
}
#file-previews:empty { display: none; }
.file-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--teal);
  background: var(--teal-dim);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius);
  padding: 2px 8px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.file-tag .file-remove {
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
}
.file-tag .file-remove:hover { color: var(--red); }

/* Hidden file input */
#file-input { display: none; }

/* ===== RIGHT PANEL ===== */
#right-panel {
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.right-panel-header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  gap: 6px;
}
.right-panel-tab {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  background: none;
  border: 1px solid transparent;
  border-radius: var(--radius);
  padding: 4px 10px;
  cursor: pointer;
  transition: color 0.12s, border-color 0.12s;
}
.right-panel-tab:hover { color: var(--text-body); }
.right-panel-tab.active {
  color: var(--mint);
  border-color: var(--border-accent);
  background: var(--teal-dim);
}

/* Members view */
#members-view {
  flex: 1;
  overflow-y: auto;
  padding: 10px 0;
}
.member-group-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  padding: 8px 16px 4px;
}
.member-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 16px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-body);
  cursor: default;
}
.member-item:hover { background: var(--bg-hover); }
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.online { background: var(--mint); }
.status-dot.idle { background: var(--gold); }
.status-dot.offline { background: var(--text-dim); }
.member-type {
  font-size: 10px;
  color: var(--text-dim);
  margin-left: auto;
}

/* Thread view */
#thread-view {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#thread-view.visible {
  display: flex;
}
.thread-header-info {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-muted);
}
.thread-header-info .thread-parent-author {
  font-family: var(--font-mono);
  color: var(--mint);
  font-weight: 500;
}
#thread-messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.thread-compose {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 6px;
}
.thread-compose textarea {
  flex: 1;
  font-family: var(--font-body);
  font-weight: 300;
  font-size: 13px;
  color: var(--text-body);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 10px;
  resize: none;
  min-height: 30px;
  outline: none;
}
.thread-compose textarea:focus { border-color: var(--border-accent); }
.thread-compose .btn-send {
  font-size: 12px;
  padding: 6px 12px;
}

/* ===== MODAL OVERLAY ===== */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
}
#modal-overlay.visible {
  display: flex;
}
.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius);
  padding: 24px;
  width: 380px;
  max-width: 90vw;
}
.modal h2 {
  font-family: var(--font-heading);
  font-size: 20px;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 16px;
}
.modal label {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal label:first-of-type { margin-top: 0; }
.modal input,
.modal textarea {
  width: 100%;
  font-family: var(--font-body);
  font-weight: 300;
  font-size: 14px;
  color: var(--text-body);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  outline: none;
  transition: border-color 0.15s;
}
.modal input:focus,
.modal textarea:focus { border-color: var(--border-accent); }
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}
.modal-actions .btn-cancel {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 16px;
  cursor: pointer;
  transition: color 0.12s, border-color 0.12s;
}
.modal-actions .btn-cancel:hover {
  color: var(--text-body);
  border-color: var(--border-accent);
}
.modal-actions .btn-create {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--bg-deep);
  background: var(--mint);
  border: none;
  border-radius: var(--radius);
  padding: 7px 16px;
  cursor: pointer;
  box-shadow: 0 0 12px var(--mint-glow);
  transition: background 0.15s;
}
.modal-actions .btn-create:hover { background: var(--mint-dim); }

/* ===== EMPTY STATES ===== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: var(--text-dim);
  font-size: 14px;
  gap: 6px;
  padding: 40px;
  text-align: center;
}
.empty-state .empty-icon {
  font-size: 32px;
  opacity: 0.4;
  margin-bottom: 4px;
}
/* Ensure cursor-pointer on all interactive elements */
.channel-item, .msg-actions button, .thread-indicator,
.right-panel-tab, .action-item input[type="checkbox"] { cursor: pointer; }
/* Focus states for keyboard nav */
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
  outline: 2px solid var(--mint);
  outline-offset: 1px;
}
.channel-item:focus-visible { outline: 2px solid var(--mint); outline-offset: -2px; }
/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<!-- ===== TOP NAV ===== -->
<nav id="topnav">
  <div class="brand">Agent <span>Comms</span></div>
  <div class="nav-stat">msgs: <b id="stat-msg-count">0</b></div>
  <div class="nav-stat warn">open items: <b id="stat-open-items">0</b></div>
  <div class="nav-spacer"></div>
  <a href="/" class="nav-link">LLM Ctrl</a>
</nav>

<!-- ===== APP 3-COL GRID ===== -->
<div id="app">

  <!-- LEFT SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2>Channels</h2>
      <button class="btn-new-channel" id="btn-new-channel">+ New</button>
    </div>
    <div id="channel-list">
      <!-- Channel items rendered by JS -->
    </div>
  </aside>

  <!-- CENTER COLUMN -->
  <main id="center">
    <div class="channel-header">
      <div class="ch-title"><span class="hash">#</span><span id="ch-header-name">general</span></div>
      <div class="ch-desc" id="ch-header-desc">Select a channel to begin</div>
    </div>

    <div id="message-feed">
      <!-- Messages rendered by JS -->
      <div class="empty-state" id="feed-empty">
        <div class="empty-icon">&#x2709;</div>
        <div>No messages yet</div>
        <div style="font-size:12px;color:var(--text-dim);">Send the first message below</div>
      </div>
    </div>

    <div id="compose-bar">
      <div id="file-previews"></div>
      <div class="compose-top">
        <input type="text" id="author-name" placeholder="Your name" autocomplete="off">
        <select id="author-type">
          <option value="human">human</option>
          <option value="agent">agent</option>
        </select>
      </div>
      <div class="compose-bottom">
        <button class="btn-attach" id="btn-attach" title="Attach file" aria-label="Attach file">+</button>
        <input type="file" id="file-input" multiple>
        <textarea id="compose-textarea" placeholder="Type a message..." rows="1"></textarea>
        <button class="btn-send" id="btn-send">Send</button>
      </div>
    </div>
  </main>

  <!-- RIGHT PANEL -->
  <aside id="right-panel">
    <div class="right-panel-header">
      <button class="right-panel-tab active" data-panel="members">Members</button>
      <button class="right-panel-tab" data-panel="thread">Thread</button>
    </div>

    <div id="members-view">
      <div class="member-group-label">Online</div>
      <!-- Member items rendered by JS -->
    </div>

    <div id="thread-view">
      <div class="thread-header-info">
        Thread on message by <span class="thread-parent-author" id="thread-parent-author">--</span>
      </div>
      <div id="thread-messages">
        <!-- Thread messages rendered by JS -->
      </div>
      <div class="thread-compose">
        <textarea id="thread-textarea" placeholder="Reply in thread..." rows="1"></textarea>
        <button class="btn-send" id="btn-thread-send">Send</button>
      </div>
    </div>
  </aside>

</div>

<!-- ===== NEW CHANNEL MODAL ===== -->
<div id="modal-overlay">
  <div class="modal" id="modal-new-channel">
    <h2>New Channel</h2>
    <label for="modal-ch-name">Name</label>
    <input type="text" id="modal-ch-name" placeholder="e.g. planning" autocomplete="off">
    <label for="modal-ch-desc">Description</label>
    <input type="text" id="modal-ch-desc" placeholder="What is this channel about?" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-create" id="modal-create">Create</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const API = window.location.origin + '/api';

  let state = {
    channels: [],
    activeChannel: null,
    messages: [],
    lastMessageTime: null,
    activeThread: null,
    threadMessages: [],
    pendingFiles: [],
    members: {}
  };

  // ===== DOM refs =====
  const $ = id => document.getElementById(id);
  const statMsgCount    = $('stat-msg-count');
  const statOpenItems   = $('stat-open-items');
  const channelList     = $('channel-list');
  const btnNewChannel   = $('btn-new-channel');
  const chHeaderName    = $('ch-header-name');
  const chHeaderDesc    = $('ch-header-desc');
  const messageFeed     = $('message-feed');
  const feedEmpty       = $('feed-empty');
  const composeBar      = $('compose-bar');
  const filePreviews    = $('file-previews');
  const authorName      = $('author-name');
  const authorType      = $('author-type');
  const btnAttach       = $('btn-attach');
  const fileInput       = $('file-input');
  const composeTextarea = $('compose-textarea');
  const btnSend         = $('btn-send');
  const membersView     = $('members-view');
  const threadView      = $('thread-view');
  const threadParentAuthor = $('thread-parent-author');
  const threadMessages  = $('thread-messages');
  const threadTextarea  = $('thread-textarea');
  const btnThreadSend   = $('btn-thread-send');
  const modalOverlay    = $('modal-overlay');
  const modalChName     = $('modal-ch-name');
  const modalChDesc     = $('modal-ch-desc');
  const modalCancel     = $('modal-cancel');
  const modalCreate     = $('modal-create');

  // ===== Helpers =====
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderMarkdown(text) {
    if (!text) return '';
    let html = escapeHtml(text);
    // Code blocks: ```...```
    html = html.replace(/```([\s\S]*?)```/g, function(_, code) {
      return '<pre onclick="this.classList.toggle(\'expanded\')"><code>' + code.trim() + '</code></pre>';
    });
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Links (only allow http/https URLs)
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(match, text, url) {
      if (/^https?:\/\//i.test(url)) {
        return '<a href="' + url + '" target="_blank" style="color:var(--teal);text-decoration:underline;">' + text + '</a>';
      }
      return match;
    });
    // Newlines
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function formatTime(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // ===== Channel Functions =====
  async function loadChannels() {
    try {
      const res = await fetch(API + '/channels');
      state.channels = await res.json();
      renderChannels();
    } catch (e) { console.error('loadChannels', e); }
  }

  function renderChannels() {
    channelList.innerHTML = state.channels.map(ch => {
      const active = state.activeChannel && state.activeChannel.id === ch.id ? ' active' : '';
      return '<div class="channel-item' + active + '" data-id="' + ch.id + '">' +
        '<span class="ch-prefix">#</span>' +
        '<span class="ch-name">' + escapeHtml(ch.name) + '</span>' +
        '</div>';
    }).join('');
    channelList.querySelectorAll('.channel-item').forEach(el => {
      el.addEventListener('click', () => selectChannel(parseInt(el.dataset.id)));
    });
  }

  async function selectChannel(id) {
    const ch = state.channels.find(c => c.id === id);
    if (!ch) return;
    state.activeChannel = ch;
    state.messages = [];
    state.lastMessageTime = null;
    state.members = {};
    chHeaderName.textContent = ch.name;
    chHeaderDesc.textContent = ch.description || '';
    composeTextarea.placeholder = 'Message #' + ch.name + '...';
    renderChannels();
    await loadMessages(true);
    renderMembers();
  }

  async function createChannel() {
    const name = modalChName.value.trim();
    const desc = modalChDesc.value.trim();
    if (!name) return;
    try {
      const res = await fetch(API + '/channels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, description: desc })
      });
      const newCh = await res.json();
      await loadChannels();
      selectChannel(newCh.id);
      hideModal();
    } catch (e) { console.error('createChannel', e); }
  }

  // ===== Message Functions =====
  async function loadMessages(initial) {
    if (!state.activeChannel) return;
    let url = API + '/channels/' + state.activeChannel.id + '/messages';
    if (initial || !state.lastMessageTime) {
      url += '?limit=50';
    } else {
      url += '?since=' + encodeURIComponent(state.lastMessageTime);
    }
    try {
      const res = await fetch(url);
      const msgs = await res.json();
      if (initial) {
        state.messages = msgs;
      } else if (msgs.length) {
        // Append new messages, avoid duplicates
        const existingIds = new Set(state.messages.map(m => m.id));
        msgs.forEach(m => { if (!existingIds.has(m.id)) state.messages.push(m); });
      }
      if (state.messages.length > 0) {
        state.lastMessageTime = state.messages[state.messages.length - 1].created_at;
      }
      // Track members from new messages only
      const newMsgs = initial ? state.messages : msgs;
      newMsgs.forEach(m => {
        if (m.author_name) {
          state.members[m.author_name] = {
            type: m.author_type || 'human',
            lastSeen: m.created_at
          };
        }
      });
      statMsgCount.textContent = state.messages.length;
      renderMessages();
      if (!initial) renderMembers();
    } catch (e) { console.error('loadMessages', e); }
  }

  function renderMessages() {
    // Check if user is scrolled near bottom before rendering
    const isAtBottom = messageFeed.scrollTop + messageFeed.clientHeight >= messageFeed.scrollHeight - 40;

    // Remove old messages but keep feed-empty
    const oldMsgs = messageFeed.querySelectorAll('.msg-group');
    oldMsgs.forEach(el => el.remove());

    if (state.messages.length === 0) {
      feedEmpty.style.display = '';
      return;
    }
    feedEmpty.style.display = 'none';

    const frag = document.createDocumentFragment();
    state.messages.forEach(m => {
      const el = renderMessage(m);
      frag.appendChild(el);
    });
    messageFeed.insertBefore(frag, feedEmpty);

    if (isAtBottom) {
      messageFeed.scrollTop = messageFeed.scrollHeight;
    }
  }

  function renderMessage(m) {
    const div = document.createElement('div');
    div.className = 'msg-group';
    div.dataset.id = m.id;

    const typeClass = m.author_type === 'agent' ? 'agent' : 'human';

    let html = '<div class="msg-head">' +
      '<span class="msg-author ' + typeClass + '">' + escapeHtml(m.author_name) + '</span>' +
      '<span class="msg-badge">' + typeClass + '</span>' +
      '<span class="msg-time">' + formatTime(m.created_at) + '</span>' +
      '</div>';

    html += '<div class="msg-content">' + renderMarkdown(m.content) + '</div>';

    // Attachments
    if (m.attachments && m.attachments.length) {
      let mediaHtml = '';
      let chipHtml = '';
      m.attachments.forEach(a => {
        const url = '/' + a.storage_path;
        const mime = a.mime_type || '';
        if (mime.startsWith('image/')) {
          mediaHtml += '<img class="img-preview" src="' + escapeHtml(url) + '" alt="' + escapeHtml(a.filename) + '">';
        } else if (mime.startsWith('video/')) {
          mediaHtml += '<video class="video-preview" src="' + escapeHtml(url) + '" controls></video>';
        } else {
          chipHtml += '<a class="attachment-chip" href="' + escapeHtml(url) + '" download="' + escapeHtml(a.filename) + '">' + escapeHtml(a.filename) + '</a>';
        }
      });
      if (mediaHtml) html += mediaHtml;
      if (chipHtml) html += '<div class="msg-attachments">' + chipHtml + '</div>';
    }

    // Action items
    if (m.action_items && m.action_items.length) {
      html += '<div class="action-items">';
      m.action_items.forEach(ai => {
        const checked = ai.completed ? ' checked' : '';
        const completedClass = ai.completed ? ' completed' : '';
        html += '<div class="action-item' + completedClass + '">' +
          '<input type="checkbox"' + checked + ' onchange="window.__toggleActionItem(' + ai.id + ', this.checked)">' +
          '<label>' + escapeHtml(ai.text) + '</label></div>';
      });
      html += '</div>';
    }

    // Metadata (stored as JSON string in DB)
    if (m.metadata) {
      let metaDisplay;
      try {
        const parsed = typeof m.metadata === 'string' ? JSON.parse(m.metadata) : m.metadata;
        metaDisplay = JSON.stringify(parsed, null, 2);
      } catch { metaDisplay = String(m.metadata); }
      html += '<details class="msg-metadata"><summary>metadata</summary>' +
        '<pre>' + escapeHtml(metaDisplay) + '</pre></details>';
    }

    // Thread indicator
    if (m.reply_count && m.reply_count > 0) {
      html += '<div class="thread-indicator" onclick="window.__openThread(' + m.id + ')">' +
        '<span class="thread-count">' + m.reply_count + '</span> replies</div>';
    }

    // Actions
    html += '<div class="msg-actions">' +
      '<button onclick="window.__openThread(' + m.id + ')">Reply</button>' +
      '</div>';

    div.innerHTML = html;
    return div;
  }

  async function toggleActionItem(id, checked) {
    try {
      const completedBy = authorName.value.trim() || 'anonymous';
      await fetch(API + '/action-items/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed: checked, completed_by: completedBy })
      });
      await loadMessages(true);
      pollActionCount();
    } catch (e) { console.error('toggleActionItem', e); }
  }
  window.__toggleActionItem = toggleActionItem;

  // ===== Thread Functions =====
  async function openThread(messageId) {
    state.activeThread = messageId;
    switchPanel('thread');
    await loadThread(messageId);
  }
  window.__openThread = openThread;

  async function loadThread(messageId) {
    try {
      const res = await fetch(API + '/messages/' + messageId + '/thread');
      const data = await res.json();
      state.threadMessages = Array.isArray(data) ? data : (data.replies || []);
      // Find parent message
      const parent = state.messages.find(m => m.id === messageId);
      if (parent) {
        threadParentAuthor.textContent = parent.author_name || '--';
      }
      renderThread();
    } catch (e) { console.error('loadThread', e); }
  }

  function renderThread() {
    threadMessages.innerHTML = state.threadMessages.map(m => {
      const typeClass = m.author_type === 'agent' ? 'agent' : 'human';
      return '<div class="msg-group" style="padding:6px 8px;">' +
        '<div class="msg-head">' +
        '<span class="msg-author ' + typeClass + '">' + escapeHtml(m.author_name) + '</span>' +
        '<span class="msg-time">' + formatTime(m.created_at) + '</span>' +
        '</div>' +
        '<div class="msg-content">' + renderMarkdown(m.content) + '</div>' +
        '</div>';
    }).join('');
  }

  async function sendThreadReply() {
    if (!state.activeChannel || !state.activeThread) return;
    const content = threadTextarea.value.trim();
    if (!content) return;
    const name = authorName.value.trim() || 'anonymous';
    const type = authorType.value;
    try {
      await fetch(API + '/channels/' + state.activeChannel.id + '/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          author_name: name,
          author_type: type,
          content: content,
          thread_parent_id: state.activeThread
        })
      });
      threadTextarea.value = '';
      await loadThread(state.activeThread);
      await loadMessages(true);
    } catch (e) { console.error('sendThreadReply', e); }
  }

  // ===== Compose Functions =====
  async function sendMessage() {
    if (!state.activeChannel) return;
    const content = composeTextarea.value.trim();
    if (!content && state.pendingFiles.length === 0) return;
    const name = authorName.value.trim() || 'anonymous';
    const type = authorType.value;

    // Parse action items: lines starting with [] or [ ]
    const lines = content.split('\n');
    const actionItems = [];
    const contentLines = [];
    lines.forEach(line => {
      const match = line.match(/^\[\s?\]\s+(.+)/);
      if (match) {
        actionItems.push(match[1].trim());
      } else {
        contentLines.push(line);
      }
    });
    const finalContent = contentLines.join('\n');

    try {
      if (state.pendingFiles.length > 0) {
        // Multipart upload
        const fd = new FormData();
        fd.append('author_name', name);
        fd.append('author_type', type);
        fd.append('content', finalContent);
        if (actionItems.length) {
          fd.append('action_items', JSON.stringify(actionItems));
        }
        state.pendingFiles.forEach(f => fd.append('files', f));
        await fetch(API + '/channels/' + state.activeChannel.id + '/messages', {
          method: 'POST',
          body: fd
        });
      } else {
        const body = {
          author_name: name,
          author_type: type,
          content: finalContent
        };
        if (actionItems.length) {
          body.action_items = actionItems;
        }
        await fetch(API + '/channels/' + state.activeChannel.id + '/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
      }
      composeTextarea.value = '';
      state.pendingFiles = [];
      renderFilePreview();
      await loadMessages(true);
      messageFeed.scrollTop = messageFeed.scrollHeight;
      pollActionCount();
    } catch (e) { console.error('sendMessage', e); }
  }

  function renderFilePreview() {
    filePreviews.innerHTML = state.pendingFiles.map((f, i) =>
      '<span class="file-tag">' + escapeHtml(f.name) +
      '<span class="file-remove" onclick="window.__removeFile(' + i + ')">x</span></span>'
    ).join('');
  }

  function removeFile(index) {
    state.pendingFiles.splice(index, 1);
    renderFilePreview();
  }
  window.__removeFile = removeFile;

  // ===== Members =====
  function renderMembers() {
    const entries = Object.entries(state.members);
    if (!entries.length) {
      membersView.innerHTML = '<div class="member-group-label">No members yet</div>';
      return;
    }
    const now = Date.now();
    const online = [];
    const idle = [];
    const offline = [];
    entries.forEach(([name, info]) => {
      const diff = (now - new Date(info.lastSeen).getTime()) / 1000;
      let status;
      if (diff < 60) status = 'online';
      else if (diff < 600) status = 'idle';
      else status = 'offline';
      const entry = { name, type: info.type, status };
      if (status === 'online') online.push(entry);
      else if (status === 'idle') idle.push(entry);
      else offline.push(entry);
    });

    let html = '';
    if (online.length) {
      html += '<div class="member-group-label">Online</div>';
      online.forEach(m => { html += memberHtml(m); });
    }
    if (idle.length) {
      html += '<div class="member-group-label">Idle</div>';
      idle.forEach(m => { html += memberHtml(m); });
    }
    if (offline.length) {
      html += '<div class="member-group-label">Offline</div>';
      offline.forEach(m => { html += memberHtml(m); });
    }
    membersView.innerHTML = html;
  }

  function memberHtml(m) {
    return '<div class="member-item">' +
      '<span class="status-dot ' + m.status + '"></span>' +
      '<span>' + escapeHtml(m.name) + '</span>' +
      '<span class="member-type">' + m.type + '</span></div>';
  }

  // ===== Polling =====
  async function pollMessages() {
    if (!state.activeChannel) return;
    const wasAtBottom = messageFeed.scrollTop + messageFeed.clientHeight >= messageFeed.scrollHeight - 40;
    const promises = [loadMessages(false)];
    if (state.activeThread) promises.push(loadThread(state.activeThread));
    await Promise.all(promises);
    if (wasAtBottom) {
      messageFeed.scrollTop = messageFeed.scrollHeight;
    }
  }

  async function pollActionCount() {
    try {
      const res = await fetch(API + '/action-items?completed=false');
      const items = await res.json();
      statOpenItems.textContent = Array.isArray(items) ? items.length : 0;
    } catch (e) { console.error('pollActionCount', e); }
  }

  // ===== Modal =====
  function showModal() {
    modalChName.value = '';
    modalChDesc.value = '';
    modalOverlay.classList.add('visible');
    modalChName.focus();
  }
  function hideModal() {
    modalOverlay.classList.remove('visible');
  }

  // ===== Tab Switching =====
  function switchPanel(panel) {
    document.querySelectorAll('.right-panel-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.panel === panel);
    });
    if (panel === 'members') {
      membersView.style.display = '';
      threadView.style.display = 'none';
      threadView.classList.remove('visible');
    } else {
      membersView.style.display = 'none';
      threadView.style.display = 'flex';
      threadView.classList.add('visible');
    }
  }

  // ===== Init =====
  function init() {
    // Restore from localStorage
    const savedName = localStorage.getItem('comms-author');
    const savedType = localStorage.getItem('comms-author-type');
    if (savedName) authorName.value = savedName;
    if (savedType) authorType.value = savedType;

    // Save on change
    authorName.addEventListener('input', () => localStorage.setItem('comms-author', authorName.value));
    authorType.addEventListener('change', () => localStorage.setItem('comms-author-type', authorType.value));

    // Enter key on compose
    composeTextarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Enter key on thread
    threadTextarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendThreadReply();
      }
    });

    // File input
    fileInput.addEventListener('change', () => {
      Array.from(fileInput.files).forEach(f => state.pendingFiles.push(f));
      fileInput.value = '';
      renderFilePreview();
    });
    btnAttach.addEventListener('click', () => fileInput.click());

    // Buttons
    btnSend.addEventListener('click', sendMessage);
    btnThreadSend.addEventListener('click', sendThreadReply);
    btnNewChannel.addEventListener('click', showModal);
    modalCancel.addEventListener('click', hideModal);
    modalCreate.addEventListener('click', createChannel);

    // Modal: close on overlay click
    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) hideModal();
    });

    // Right panel tabs
    document.querySelectorAll('.right-panel-tab').forEach(btn => {
      btn.addEventListener('click', () => switchPanel(btn.dataset.panel));
    });

    // Load channels and select first
    loadChannels().then(() => {
      if (state.channels.length > 0) {
        selectChannel(state.channels[0].id);
      }
    });

    // Polling
    setInterval(pollMessages, 3000);
    setInterval(pollActionCount, 10000);
    pollActionCount();
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
